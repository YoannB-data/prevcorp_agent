    difficulte: hard
    scope: sql
    tables: [fct__dossiers, fct__ressources, fct__paiements]
    note: "3 critères simultanés — question la plus complexe du set"

  - id: Q041
    question: "Extraction des dossiers [NATURE_ARRET] en cours ayant une date d'état de dossier antérieure ou égale au 31/08/2025."
    categorie: multi_criteres
    difficulte: medium
    scope: sql
    tables: [fct__dossiers]

  - id: Q042
    question: "Extraction des dossiers qui ont d'autres ressources que PE ou salaire."
    categorie: multi_criteres
    difficulte: medium
    scope: sql
    tables: [fct__dossiers, fct__ressources]
    note: "ressource_type NOT IN (PE, Salaire)"

  - id: Q043
    question: "Extraction des dossiers qui ont plusieurs ressources."
    categorie: multi_criteres
    difficulte: medium
    scope: sql
    tables: [fct__dossiers, fct__ressources]
    note: "COUNT(ressource_id) > 1 par dossier"

