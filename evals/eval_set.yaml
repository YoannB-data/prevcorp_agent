  # ─────────────────────────────────────────────
  # TOP N
  # ─────────────────────────────────────────────

  - id: Q018
    question: "Peux-tu me sortir le top 10 des salaires ?"
    categorie: top_n
    difficulte: easy
    scope: sql
    tables: [fct__dossiers]
    note: "ORDER BY salaire_montant DESC LIMIT 10"

  - id: Q019
    question: "Extraction des 10 rentes DC en cours avec les plus gros salaires."
    categorie: top_n
    difficulte: medium
    scope: sql
    tables: [fct__dossiers]
    note: "Filtre risque IN (Rente viagère, Rente éducation), est_en_cours=true, TOP 10"

  # ─────────────────────────────────────────────
  # MULTI CRITERES
  # ─────────────────────────────────────────────

  - id: Q001
    question: "Extraction de tous les dossiers d'invalidité automatique où il n'y a pas d'information remplie dans les champs attestation de non-activité et justificatif SS."
    categorie: multi_criteres
    difficulte: hard
    scope: sql
    tables: [fct__dossiers]
    note: "risque=Invalidité ET attest_non_activite_date IS NULL ET justif_ss_date IS NULL"

  - id: Q002
    question: "Extraction des enseignants qui ont reçu des prestations au titre de la garantie incapacité en 2025."
    categorie: multi_criteres
    difficulte: hard
    scope: sql
    tables: [fct__dossiers, fct__paiements, dim__contrats]
    note: "Segment enseignement + risque=Incapacité + paiement en 2025"

  - id: Q004
    question: "Extraction des invalidités automatiques où on n'a pas reçu l'attestation de non-activité ou le justificatif SS ou les deux."
    categorie: multi_criteres
    difficulte: hard
    scope: sql
    tables: [fct__dossiers]
    note: "Variante de Q001 avec OR — distinction subtile à tester"

  - id: Q010
    question: "Nombre de bénéficiaires habitant à l'étranger sur chacun des 4 trimestres et/ou 12 mois de 2025."
    categorie: multi_criteres
    difficulte: hard
    scope: sql
    tables: [dim__assures, fct__dossiers]
    note: "Agrégation temporelle + filtre géographique — double axe d'analyse"

  - id: Q011
    question: "Cartographie en termes de pays des assurés résidant à l'étranger."
    categorie: multi_criteres
    difficulte: medium
    scope: sql
    tables: [dim__assures]
    note: "GROUP BY pays_code WHERE pays_code != FR"

  - id: Q035
    question: "Quelle est la part des paiements avec un montant PAS (Prélèvement À la Source) en nombre et en pourcentage ?"
    categorie: multi_criteres
    difficulte: medium
    scope: sql
    tables: [fct__paiements]
    note: "Ratio paiements avec pas_montant > 0 sur total paiements"

  - id: Q036
    question: "Liste des dossiers incapacité [NATURE_PERSONNEL] en cours — avec ressources au-delà du 31/10/2025 — sans règlement depuis le 01/11/2025."
