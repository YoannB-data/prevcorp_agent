# Eval set v0 — PrevCorp Agent
# Phase 0 — collecte initiale
# Source : questions réelles collectées auprès de gestionnaires (anonymisées et adaptées au schéma PrevCorp)
# Format : question brute → catégorie → difficulté → scope → statut

meta:
  version: "0.1"
  date: "2025"
  total: 63
  categories:
    - agregation
    - liste
    - filtrage_temporel
    - filtrage_entite
    - top_n
    - multi_criteres
    - dossier_individuel
    - rag
    - ambigue
    - hors_scope
  difficultes:
    - easy       # 1 table, 1 filtre
    - medium     # 2-3 tables, jointure simple
    - hard       # jointures multiples, conditions complexes, négations

questions:

  # ─────────────────────────────────────────────
  # AGREGATION
  # ─────────────────────────────────────────────

  - id: Q012
    question: "Combien avons-nous d'attestations fiscales à date ?"
    categorie: agregation
    difficulte: easy
    scope: sql
    tables: [dim__assures]
    note: "COUNT sur attestation_fiscale_etranger = true"

  - id: Q034
    question: "Combien de dossiers ont été indemnisés au moins 1 fois en 2025 ?"
    categorie: agregation
    difficulte: medium
    scope: sql
    tables: [fct__dossiers, fct__paiements]
    note: "Jointure dossiers/paiements avec filtre année 2025"

  - id: Q044
    question: "Compte le nombre de dossiers créés en 2024, répartis par risque et par entreprise."
    categorie: agregation
    difficulte: medium
    scope: sql
    tables: [fct__dossiers]
    note: "GROUP BY risque, entreprise_id avec filtre creation_date"

  - id: Q045
    question: "À quelle période de l'année a-t-on le plus d'activité en cotisations et en prestations ?"
    categorie: agregation
    difficulte: hard
    scope: sql
    tables: [fct__cotisations, fct__paiements]
    note: "Agrégation par mois sur deux tables — question analytique ouverte"

  - id: Q012b
    question: "Quel est le montant total des prestations versées depuis le début de l'année ?"
    categorie: agregation
    difficulte: easy
    scope: sql
    tables: [fct__paiements]

  # ─────────────────────────────────────────────
  # LISTE
  # ─────────────────────────────────────────────

  - id: Q003
    question: "Peux-tu me faire une extraction des invalidités en cours pour [NOM_ENTREPRISE] : cadres = [NUM_CONTRAT] et non-cadres = [NUM_CONTRAT] ?"
    categorie: liste
    difficulte: medium
    scope: sql
    tables: [fct__dossiers, dim__contrats, dim__entreprises]
    note: "Filtre sur risque=Invalidité, est_en_cours=true, deux contrats distincts"

  - id: Q007
    question: "Liste exhaustive des sinistres en cours de versement en 2024, ayant un fait générateur antérieur au 01/01/2024."
    categorie: liste
    difficulte: hard
    scope: sql
    tables: [fct__dossiers, fct__paiements]
    note: "Fait générateur < 2024 ET paiement en 2024 ET dossier en cours"

  - id: Q008
    question: "Peux-tu sortir le nom et l'adresse des affiliés habitant à l'étranger et indiquer si des prestations (incapacité, invalidité et décès) sont en cours ou non ?"
    categorie: liste
    difficulte: hard
    scope: sql
    tables: [dim__assures, fct__dossiers]
    note: "pays_code != FR, jointure avec dossiers pour statut en cours"

  - id: Q009
    question: "Peux-tu sortir la liste des affiliés qui ont une attestation fiscale étranger et indiquer si des prestations sont en cours ou non ?"
    categorie: liste
    difficulte: hard
    scope: sql
    tables: [dim__assures, fct__dossiers]
    note: "attestation_fiscale_etranger=true, jointure dossiers"

  - id: Q017
    question: "Extraction de tous les dossiers en cours pour les contrats suivants : CADRE [NUM_CONTRAT] et NON CADRE [NUM_CONTRAT]."
    categorie: liste
    difficulte: medium
    scope: sql
    tables: [fct__dossiers, dim__contrats]

  - id: Q022
    question: "Contrat [NUM_CONTRAT] : fournir un état des dossiers prévoyance en cours."
    categorie: liste
    difficulte: easy
    scope: sql
    tables: [fct__dossiers]

  - id: Q023
    question: "Extraction de tous les dossiers existants sur l'entreprise [NOM_ENTREPRISE] [NUM_CONTRAT]."
    categorie: liste
    difficulte: easy
    scope: sql
    tables: [fct__dossiers]

  - id: Q025
    question: "Dans notre segment [NOM_SEGMENT], il y a des contrats ouverts avec des entreprises fermées. Peux-tu nous sortir une extraction ?"
    categorie: liste
    difficulte: hard
    scope: sql
    tables: [dim__contrats, dim__entreprises, fct__dossiers]
    note: "contrat est_en_cours=true ET entreprise fin_date IS NOT NULL"

  - id: Q032
    question: "Transmettre un fichier avec tous les paiements envoyés en 2025 avec la date d'envoi."
    categorie: liste
    difficulte: easy
    scope: sql
    tables: [fct__paiements]

  - id: Q039
    question: "Extraction des contrats suivants [NUM_CONTRAT] [NUM_CONTRAT] [NUM_CONTRAT] — liste des arrêts encore en cours d'indemnisation."
    categorie: liste
    difficulte: medium
    scope: sql
    tables: [fct__dossiers, dim__contrats]

  - id: Q049
    question: "Extraction de suivi des invalidités [NOM_CONTRAT]."
    categorie: liste
    difficulte: medium
    scope: sql
    tables: [fct__dossiers, dim__contrats]
    note: "Filtre risque=Invalidité pour un contrat donné"

  - id: Q060
    question: "Liste des rentes (viagères, éducation) pour lesquelles on ne verse que de la revalorisation."
    categorie: liste
    difficulte: hard
    scope: sql
    tables: [fct__dossiers, fct__paiements]
    note: "Cas avancé — nécessite de distinguer paiements normaux et revalorisations"

  - id: Q062
    question: "Liste des rentes éducation pour les bénéficiaires qui vont avoir 18 ans cette année."
    categorie: liste
    difficulte: medium
    scope: sql
    tables: [fct__dossiers, dim__beneficiaires]
    note: "YEAR(naissance_date) = YEAR(current_date) - 18"

  - id: Q063
    question: "Liste des dossiers d'invalidité qui n'ont qu'une rente SS en ressource."
    categorie: liste
    difficulte: hard
    scope: sql
    tables: [fct__dossiers, fct__ressources]
    note: "Dossiers invalidité dont toutes les ressources sont de type Rente SS"

  - id: Q064
    question: "Liste des dossiers d'invalidité qui ont au moins une rente SS en ressource."
    categorie: liste
    difficulte: medium
    scope: sql
    tables: [fct__dossiers, fct__ressources]

  # ─────────────────────────────────────────────
  # FILTRAGE TEMPOREL
  # ─────────────────────────────────────────────

  - id: Q006
    question: "Récapitulatif des sommes versées depuis 2023 (date d'adhésion) pour l'ensemble des salariés en arrêt. Contrat [NUM_CONTRAT]."
    categorie: filtrage_temporel
    difficulte: medium
