  - id: Q021
    question: "Liste des contrats en cours et résiliés, ayant une gestion [NOM_GESTIONNAIRE], avec une date de fin max au 31/12/2023."
    categorie: filtrage_entite
    difficulte: medium
    scope: sql
    tables: [dim__contrats]

  - id: Q038
    question: "Extraction des dossiers pour lesquels un règlement a été effectué depuis 2024 sur les contrats [NUM_CONTRAT] et [NUM_CONTRAT]."
    categorie: filtrage_entite
    difficulte: medium
    scope: sql
    tables: [fct__paiements, fct__dossiers]

  - id: Q040
    question: "Extraction pour les dossiers du SIRET [NUM_SIRET] avec un règlement depuis le 01/09/2024."
