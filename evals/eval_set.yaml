    scope: sql
    tables: [fct__paiements]

  - id: Q037
    question: "Extraction de tous les paiements effectués (incapacité) depuis janvier 2025. Contrat [NUM_CONTRAT]."
    categorie: filtrage_temporel
    difficulte: medium
    scope: sql
    tables: [fct__paiements, fct__dossiers]

  - id: Q047
    question: "Relevés de prestation pour les contrats [NUM_CONTRAT] [NUM_CONTRAT] [NUM_CONTRAT] pour l'année 2023/2024 et l'année en cours."
    categorie: filtrage_temporel
    difficulte: medium
    scope: sql
    tables: [fct__paiements, dim__contrats]

  - id: Q057
    question: "Liste des contrats pour lesquels nous n'avons rien perçu en 2025."
    categorie: filtrage_temporel
    difficulte: hard
    scope: sql
    tables: [fct__cotisations, dim__contrats]
    note: "Contrats actifs sans aucune cotisation sur la période"

  - id: Q058
    question: "Liste des contrats pour lesquels nous n'avons rien perçu au T1 2025."
    categorie: filtrage_temporel
    difficulte: hard
    scope: sql
    tables: [fct__cotisations, dim__contrats]

  - id: Q059
    question: "Des prestations supplémentaires ont-elles été versées au-delà du 01/03/2025 ?"
    categorie: filtrage_temporel
    difficulte: easy
    scope: sql
    tables: [fct__paiements]

  # ─────────────────────────────────────────────
  # FILTRAGE ENTITE
  # ─────────────────────────────────────────────

  - id: Q005
    question: "Dossiers DC en cours sur les contrats du segment [NOM_SEGMENT]."
    categorie: filtrage_entite
    difficulte: medium
    scope: sql
    tables: [fct__dossiers, dim__contrats]
    note: "Filtre risque=Décès, est_en_cours=true, segment donné"

  - id: Q016
    question: "Sinistres en cours de service encore indemnisés sur l'ancien contrat [NOM_CONTRAT]."
    categorie: filtrage_entite
    difficulte: medium
