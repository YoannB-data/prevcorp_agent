    tables: [fct__paiements, fct__dossiers, dim__entreprises]

  - id: Q046
    question: "Rentes du segment [NOM_SEGMENT]."
    categorie: filtrage_entite
    difficulte: easy
    scope: sql
    tables: [fct__dossiers, dim__contrats]

  - id: Q054
    question: "Extraction des cotisations et des prestations pour les contrats [NUM_CONTRAT] [NUM_CONTRAT] [NUM_CONTRAT]."
