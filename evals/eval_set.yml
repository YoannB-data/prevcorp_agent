  # FILTRAGE ENTITE
  # ─────────────────────────────────────────────

  - id: Q005
    question: "Dossiers DC en cours sur les contrats du segment Métallurgie."
    categorie: filtrage_entite
    difficulte: medium
    scope: sql
    compare: row_count
    tables: [fct__dossiers, dim__contrats]
    note: "Filtre risque=Décès, est_en_cours=true, segment donné"
    reference_sql: "SELECT * FROM fct__dossiers WHERE segment_nom = 'Métallurgie' AND risque = 'Décès' AND est_en_cours = TRUE"

  - id: Q020
    question: "Liste des contrats en cours et résiliés, de l'entreprise Monnier."
    categorie: filtrage_entite
    difficulte: easy
    scope: sql
    compare: row_count
    tables: [dim__contrats]
    note: "Jointure fct__contrats_entreprises/dim__contrats — sans filtre est_en_cours, tous statuts confondus"
    reference_sql: "SELECT * FROM fct__contrats_entreprises AS ce JOIN dim__contrats AS c USING(contrat_id) WHERE ce.entreprise_nom = 'Monnier'"

  - id: Q021
    question: "Liste des contrats en cours au 31/12/2014, de l'entreprise Muller."
    categorie: filtrage_entite
    difficulte: medium
    scope: sql
    compare: row_count
    tables: [dim__contrats]
    note: "Snapshot au 31/12/2014 — debut_date <= date ET (fin_date IS NULL OR fin_date > date)"
    reference_sql: "SELECT * FROM fct__contrats_entreprises AS ce JOIN dim__contrats AS c USING(contrat_id) WHERE ce.entreprise_nom = 'Muller' AND c.debut_date <= '2014-12-31' AND (c.fin_date IS NULL OR c.fin_date > '2014-12-31')"

  - id: Q038
    question: "Extraction des dossiers pour lesquels un règlement a été effectué depuis 2024 sur les contrats [NUM_CONTRAT] et [NUM_CONTRAT]."
    categorie: filtrage_entite
    difficulte: medium
    scope: sql
    compare: row_count
    tables: [fct__paiements, fct__dossiers]
    note: "DISTINCT dossiers ayant reçu au moins un paiement depuis 2024 — filtre sur deux contrats"
    reference_sql: "SELECT DISTINCT d.* FROM fct__paiements AS p JOIN fct__dossiers AS d USING(dossier_id) WHERE d.contrat_numero IN ('C23224', 'C82845') AND p.paiement_date >= '2024-01-01'"

  - id: Q040
    question: "Extraction pour les dossiers du SIRET 93917251355215 avec un règlement depuis le 01/09/2024."
    categorie: filtrage_entite
    difficulte: medium
    scope: sql
    compare: row_count
    tables: [fct__paiements, fct__dossiers, dim__entreprises]
    note: "Triple jointure paiements/dossiers/entreprises — filtre SIRET + paiement_date >= 01/09/2024"
    reference_sql: "SELECT DISTINCT d.* FROM fct__paiements AS p JOIN fct__dossiers AS d USING(dossier_id) JOIN dim__entreprises AS e ON e.entreprise_id = d.entreprise_id WHERE e.SIRET = '93917251355215' AND p.paiement_date >= '2024-09-01'"

  - id: Q046
    question: "Rentes du segment Santé et action sociale."
    categorie: filtrage_entite
    difficulte: easy
    scope: sql
    compare: row_count
    tables: [fct__dossiers, dim__contrats]
    note: "Filtre risque IN (Rente viagère, Rente éducation) + segment_nom — table dénormalisée, pas de jointure"
    reference_sql: "SELECT * FROM fct__dossiers WHERE risque IN ('Rente viagère', 'Rente éducation') AND segment_nom = 'Santé et action sociale'"

  - id: Q054
    question: "Extraction des cotisations et des prestations pour les contrats C42302 C57453 C45838."
    categorie: filtrage_entite
    difficulte: medium
    scope: sql
    compare: row_count
    tables: [fct__cotisations, fct__paiements, dim__contrats]
    note: "UNION ALL cotisations et paiements avec colonnes harmonisées (type, date, montant, risque) — schéma unifié pour les deux flux"
    reference_sql: "SELECT 'cotisation' AS type, contrat_numero, encaissement_date AS date, cotisation_montant AS montant, NULL AS risque FROM fct__cotisations WHERE contrat_numero IN ('C42302', 'C57453', 'C45838') UNION ALL SELECT 'prestation' AS type, c.contrat_numero, p.paiement_date AS date, p.brut_montant AS montant, p.risque FROM fct__paiements AS p JOIN dim__contrats AS c USING(contrat_id) WHERE c.contrat_numero IN ('C42302', 'C57453', 'C45838') ORDER BY type, contrat_numero, date"

  - id: Q061
    question: "Liste des paiements sur le contrat Coste."
    categorie: filtrage_entite
    difficulte: easy
    scope: sql
    compare: row_count
    tables: [fct__paiements, fct__dossiers]
    note: "Jointure paiements/dossiers — filtre entreprise_nom, tous paiements confondus"
    reference_sql: "SELECT p.* FROM fct__paiements AS p JOIN fct__dossiers AS d USING(dossier_id) WHERE d.entreprise_nom = 'Coste'"

  # ─────────────────────────────────────────────
  # TOP N
  # ─────────────────────────────────────────────

  - id: Q018
    question: "Peux-tu me sortir le top 10 des salaires ?"
    categorie: top_n
    difficulte: easy
    scope: sql
    compare: key_set
    key_column: dossier_id
    tables: [fct__dossiers]
    note: "ORDER BY salaire_montant DESC LIMIT 10"
    reference_sql: "SELECT * FROM fct__dossiers ORDER BY salaire_montant DESC LIMIT 10"

  - id: Q019
    question: "Extraction des 10 rentes DC en cours avec les plus gros salaires."
    categorie: top_n
    difficulte: medium
    scope: sql
    compare: key_set
    key_column: dossier_id
    tables: [fct__dossiers]
    note: "Filtre risque IN (Rente viagère, Rente éducation), est_en_cours=true, TOP 10"
    reference_sql: "SELECT * FROM fct__dossiers WHERE risque IN ('Rente viagère', 'Rente éducation') AND est_en_cours = TRUE ORDER BY salaire_montant DESC LIMIT 10"

  # ─────────────────────────────────────────────
  # MULTI CRITERES
  # ─────────────────────────────────────────────

  - id: Q001
    question: "Extraction de tous les dossiers d'invalidité en cours où il n'y a pas d'information remplie dans les champs attestation de non-activité et justificatif SS."
    categorie: multi_criteres
    difficulte: hard
    scope: sql
    compare: row_count
    tables: [fct__dossiers]
    note: "risque=Invalidité ET attest_non_activite_date IS NULL ET justif_ss_date IS NULL"
    reference_sql: "SELECT * FROM fct__dossiers WHERE risque = 'Invalidité' AND est_en_cours = TRUE AND attest_non_activite_date IS NULL AND justif_ss_date IS NULL"

  - id: Q002
    question: "Extraction des non cadres qui ont reçu des prestations au titre de la garantie incapacité en 2025."
    categorie: multi_criteres
    difficulte: hard
    scope: sql
    compare: row_count
    tables: [fct__dossiers, fct__paiements, dim__contrats]
    note: "Jointure dossiers/paiements — filtre contrat_type=NON CADRE + risque=Incapacité + paiement en 2025"
    reference_sql: "SELECT DISTINCT d.* FROM fct__dossiers AS d JOIN fct__paiements AS p USING(dossier_id) WHERE d.contrat_type = 'NON CADRE' AND d.risque = 'Incapacité' AND YEAR(p.paiement_date) = 2025"

  - id: Q004
    question: "Extraction des invalidités en cours où on n'a pas reçu l'attestation de non-activité ou le justificatif SS ou les deux."
    categorie: multi_criteres
    difficulte: hard
    scope: sql
    compare: row_count
    tables: [fct__dossiers]
    note: "Variante de Q001 avec OR — distinction subtile à tester"
    reference_sql: "SELECT * FROM fct__dossiers WHERE risque = 'Invalidité' AND est_en_cours = TRUE AND (attest_non_activite_date IS NULL OR justif_ss_date IS NULL)"

  - id: Q010
    question: "Nombre de bénéficiaires habitant à l'étranger indemnisés par mois en 2025."
    categorie: multi_criteres
    difficulte: hard
    scope: sql
    compare: exact_sorted
    key_column: mois
    tables: [dim__assures, fct__dossiers]
    note: "Agrégation temporelle + filtre géographique — double axe d'analyse"
    reference_sql: "SELECT MONTH(p.paiement_date) AS mois, COUNT(DISTINCT d.assure_id) AS nb_beneficiaires FROM fct__paiements AS p JOIN fct__dossiers AS d USING(dossier_id) JOIN dim__assures AS a ON a.assure_id = d.assure_id WHERE a.pays_code != 'FR' AND YEAR(p.paiement_date) = 2025 GROUP BY MONTH(p.paiement_date) ORDER BY mois"

  - id: Q011
    question: "Cartographie en termes de pays des assurés résidant à l'étranger qui ont un dossier en cours."
    categorie: multi_criteres
    difficulte: medium
    scope: sql
    compare: exact_sorted
    key_column: pays_code
    tables: [dim__assures]
    note: "GROUP BY pays_code WHERE pays_code != FR"
    reference_sql: "SELECT a.pays_code, COUNT(DISTINCT d.assure_id) AS nb_assures FROM fct__dossiers AS d JOIN dim__assures AS a USING(assure_id) WHERE a.pays_code != 'FR' AND d.est_en_cours = TRUE GROUP BY a.pays_code ORDER BY nb_assures DESC"

  - id: Q035
    question: "Quelle est la part des paiements avec un montant PAS (Prélèvement À la Source) supérieur à 10€ en nombre et en pourcentage ?"
    categorie: multi_criteres
    difficulte: medium
    scope: sql
    compare: exact_sorted
    key_column: nb_total
    tables: [fct__paiements]
    note: "Ratio paiements avec pas_montant > 10 sur total — syntaxe FILTER WHERE de DuckDB. 1 seule ligne retournée, exact_sorted sur nb_total"
    reference_sql: "SELECT COUNT(*) AS nb_total, COUNT(*) FILTER (WHERE pas_montant > 10) AS nb_avec_pas, ROUND(COUNT(*) FILTER (WHERE pas_montant > 10) * 100.0 / COUNT(*), 2) AS pct_avec_pas FROM fct__paiements"

  - id: Q041
    question: "Extraction des dossiers d'incapacité en cours ayant une date d'état de dossier antérieure ou égale au 31/08/2025."
    categorie: multi_criteres
    difficulte: medium
    scope: sql
    compare: row_count
    tables: [fct__dossiers]
    note: "Filtre risque=Incapacité + est_en_cours=true + etat_date <= '2025-08-31'"
    reference_sql: "SELECT * FROM fct__dossiers WHERE risque = 'Incapacité' AND est_en_cours = TRUE AND etat_date <= '2025-08-31'"

  - id: Q042
    question: "Extraction des dossiers qui ont d'autres ressources que PE ou salaire."
    categorie: multi_criteres
    difficulte: medium
    scope: sql
    compare: row_count
    tables: [fct__dossiers, fct__ressources]
    note: "ressource_type NOT IN (PE, Salaire)"
    reference_sql: "SELECT DISTINCT d.* FROM fct__dossiers AS d JOIN fct__ressources AS r USING(dossier_id) WHERE r.ressource_type NOT IN ('PE', 'Salaire')"

  - id: Q043
    question: "Extraction des dossiers qui ont plusieurs ressources."
    categorie: multi_criteres
    difficulte: medium
    scope: sql
    compare: row_count
    tables: [fct__dossiers, fct__ressources]
    note: "COUNT(ressource_id) > 1 par dossier"
    reference_sql: "WITH dossiers_multi_ressources AS (SELECT dossier_id FROM fct__ressources GROUP BY dossier_id HAVING COUNT(*) > 1) SELECT d.* FROM fct__dossiers AS d JOIN dossiers_multi_ressources USING(dossier_id)"

