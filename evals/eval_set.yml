  - id: Q050
    question: "Historique des paiements du dossier DOS336060."
    categorie: dossier_individuel
    difficulte: easy
    scope: sql
    compare: row_count
    tables: [fct__paiements]
    note: "Jointure paiements/dossiers — filtre dossier_numero pour récupérer l'historique complet"
    reference_sql: "SELECT p.* FROM fct__paiements AS p JOIN fct__dossiers AS d USING(dossier_id) WHERE d.dossier_numero = 'DOS336060'"

  - id: Q051
    question: "Quel est le montant fiscal 2025 à déclarer pour le dossier DOS497225 ?"
    categorie: dossier_individuel
    difficulte: easy
    scope: sql
    compare: scalar
    tables: [fct__paiements]
    note: "SUM(pas_montant) pour l'année 2025 sur un dossier — 1 ligne, valeur exacte"
    reference_sql: "SELECT SUM(p.pas_montant) FROM fct__paiements AS p JOIN fct__dossiers AS d USING(dossier_id) WHERE d.dossier_numero = 'DOS497225' AND YEAR(p.paiement_date) = 2025"

  - id: Q052
    question: "Montant à déclarer à la DGFIP pour les années 2023, 2024 et 2025 pour le dossier DOS576180."
    categorie: dossier_individuel
    difficulte: medium
    scope: sql
    compare: exact_sorted
    key_column: annee
    tables: [fct__paiements]
    note: "SUM(pas_montant) GROUP BY année sur 3 ans"
    reference_sql: "SELECT YEAR(p.paiement_date) AS annee, SUM(p.pas_montant) FROM fct__paiements AS p JOIN fct__dossiers AS d USING(dossier_id) WHERE d.dossier_numero = 'DOS576180' AND YEAR(p.paiement_date) IN (2023, 2024, 2025) GROUP BY annee ORDER BY annee"

  - id: Q053
    question: "Quel est le montant versé sur le dossier DOS541134 chaque année depuis le début ?"
    categorie: dossier_individuel
    difficulte: medium
    scope: sql
    compare: exact_sorted
    key_column: annee
    tables: [fct__paiements]
    note: "SUM(net_montant) GROUP BY YEAR(paiement_date)"
    reference_sql: "SELECT YEAR(p.paiement_date) AS annee, SUM(p.net_montant) AS montant_verse FROM fct__paiements AS p JOIN fct__dossiers AS d USING(dossier_id) WHERE d.dossier_numero = 'DOS541134' GROUP BY annee ORDER BY annee"

  - id: Q055
    question: "Extraction des paiements effectués en 2024 pour le contrat C42742."
    categorie: dossier_individuel
    difficulte: easy
    scope: sql
    compare: row_count
    tables: [fct__paiements, fct__dossiers]
    note: "Jointure paiements/contrats — filtre contrat_numero + YEAR(paiement_date) = 2024"
    reference_sql: "SELECT p.* FROM fct__paiements AS p JOIN dim__contrats AS c USING(contrat_id) WHERE c.contrat_numero = 'C42742' AND YEAR(p.paiement_date) = 2024"

  - id: Q056
    question: "Récapitulatif des paiements réalisés pour l'ensemble des collaborateurs du contrat C47930 sur 2024."
    categorie: dossier_individuel
    difficulte: medium
    scope: sql
    compare: exact_sorted
    key_column: dossier_numero
    tables: [fct__paiements, fct__dossiers, dim__assures]
    note: "Triple jointure paiements/contrats/dossiers — SUM(net_montant) GROUP BY dossier + assuré, filtre contrat_numero + 2024"
    reference_sql: "SELECT d.dossier_numero, p.assure_nom, p.assure_prenom, SUM(p.net_montant), COUNT(*) FROM fct__paiements AS p JOIN dim__contrats AS c USING(contrat_id) JOIN fct__dossiers AS d USING(dossier_id) WHERE c.contrat_numero = 'C47930' AND YEAR(p.paiement_date) = 2024 GROUP BY d.dossier_numero, p.assure_nom, p.assure_prenom ORDER BY p.assure_nom, p.assure_prenom"

